<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.item{
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
}

.item img{
  width:70px;
  height:70px;
  object-fit:contain;
  border-radius:8px;
}

.price{
  color:#ee4d2d;
  font-weight:bold;
}

input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

.btn{
  width:100%;
  padding:12px;
  background:#ee4d2d;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.btn:hover{
  background:#d84315;
}

#bankInfo{
  display:none;
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>💳 Thanh toán đơn hàng</h2>

<!-- GIỎ HÀNG -->
<div class="box" id="cartBox"></div>

<!-- THÔNG TIN KHÁCH -->
<div class="box">
  <h3>📦 Thông tin giao hàng</h3>
  <input id="name" placeholder="Họ tên">
  <input id="phone" placeholder="Số điện thoại">
  <textarea id="address" placeholder="Địa chỉ"></textarea>
</div>

<!-- THANH TOÁN -->
<div class="box">
  <h3>💰 Thanh toán</h3>

  <select id="payment">
    <option value="cod">COD (Thanh toán khi nhận hàng)</option>
    <option value="bank">Chuyển khoản ngân hàng</option>
  </select>

  <!-- BANK INFO -->
  <div id="bankInfo">
    <h3>🏦 Vietinbank</h3>
    <p><b>Chủ tài khoản:</b> HOANG ANH SON</p>
    <p><b>Số tài khoản:</b> 101005245058</p>

    <img id="qr"
      style="width:100%;max-width:250px;margin-top:10px;border-radius:8px;">
      
  </div>
</div>

<button class="btn" onclick="placeOrder()">🛒 Đặt hàng</button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* render giỏ hàng */
function renderCart(){
  const box = document.getElementById("cartBox");
  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = "Giỏ hàng trống";
    return;
  }

  let total = 0;

  cart.forEach(p=>{
    total += p.price * (p.qty || 1);

    box.innerHTML += `
      <div class="item">
        <img src="${p.img}">
        <div>
          <b>${p.name}</b><br>
          <span class="price">${(p.price*(p.qty||1)).toLocaleString()}đ</span>
        </div>
      </div>
    `;
  });

  box.innerHTML += `<h3>Tổng: ${total.toLocaleString()}đ</h3>`;
}

/* QR + BANK */
function updateBank(){
  let payment = document.getElementById("payment").value;
  let bankBox = document.getElementById("bankInfo");
  let qr = document.getElementById("qr");

  let total = 0;
  cart.forEach(p=>{
    total += p.price * (p.qty || 1);
  });

  if(payment === "bank"){
    bankBox.style.display = "block";

    qr.src =
      "https://img.vietqr.io/image/ICB-101005245058-compact2.png?amount="
      + total +
      "&addInfo=Thanh%20toan%20don%20hang";
      
  } else {
    bankBox.style.display = "none";
  }
}

document.getElementById("payment").addEventListener("change", updateBank);

/* đặt hàng */
function placeOrder(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const address = document.getElementById("address").value;

  if(!name || !phone || !address){
    alert("Vui lòng nhập đầy đủ thông tin!");
    return;
  }

  alert("Đặt hàng thành công 🎉");

  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

/* init */
renderCart();
updateBank();
</script>

</body>
</html>
