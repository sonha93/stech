<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giỏ hàng</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .item {
      display: flex;
      gap: 15px;
      background: #fff;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .item img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .info {
      flex: 1;
    }

    .price {
      color: #ee4d2d;
      font-weight: bold;
    }

    .remove {
      background: red;
      color: #fff;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .total {
      text-align: right;
      font-size: 18px;
      font-weight: bold;
      margin-top: 20px;
    }

    .empty {
      text-align: center;
      color: gray;
      margin-top: 50px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🛒 Giỏ hàng của bạn</h2>

  <div id="cartList"></div>

  <div class="total" id="total"></div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {
  const box = document.getElementById("cartList");
  const totalBox = document.getElementById("total");

  box.innerHTML = "";

  if (cart.length === 0) {
    box.innerHTML = "<div class='empty'>Giỏ hàng trống 🛒</div>";
    totalBox.innerHTML = "";
    return;
  }

  let total = 0;

  cart.forEach((p, index) => {
    total += p.price;

    box.innerHTML += `
      <div class="item">
        <img src="${p.img}">
        
        <div class="info">
          <h4>${p.name}</h4>
          <div class="price">${p.price.toLocaleString()}đ</div>
        </div>

        <button class="remove" onclick="removeItem(${index})">
          Xoá
        </button>
      </div>
    `;
  });

  totalBox.innerHTML = "Tổng tiền: " + total.toLocaleString() + "đ";
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

renderCart();
</script>

</body>
</html>

  <button style="
    width:100%;
    padding:10px;
    background:#ee4d2d;
    color:#fff;
    border:none;
    border-radius:8px;
    margin-top:10px;
  ">
    💳 Thanh toán
  </button>
</a>
